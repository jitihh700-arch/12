<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoriz - Multijoueur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 30px; margin-bottom: 30px; }
        header h1 { font-size: 3rem; background: linear-gradient(135deg, #ff4757, #ffa502); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .multiplayer-section { background: rgba(255,255,255,0.05); border-radius: 30px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .multiplayer-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .multiplayer-header h2 { font-size: 1.8rem; background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .mp-btn { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .mp-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(108,92,231,0.4); }
        .mp-btn.secondary { background: linear-gradient(135deg, #00b894, #00cec9); }
        .mp-btn.danger { background: linear-gradient(135deg, #e17055, #d63031); }
        .mp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .room-controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .room-controls input { padding: 10px 18px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem; flex: 1; min-width: 150px; outline: none; }
        .room-controls input:focus { border-color: #6c5ce7; }
        
        .players-list { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .player-card { background: rgba(255,255,255,0.08); padding: 12px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .player-card.you { border-color: #6c5ce7; background: rgba(108,92,231,0.15); }
        .player-card .score-mp { background: #6c5ce7; padding: 2px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        
        .mp-message { padding: 12px 20px; border-radius: 20px; margin-top: 10px; display: none; }
        .mp-message.success { display: block; background: rgba(0,184,148,0.15); border-left: 4px solid #00b894; }
        .mp-message.error { display: block; background: rgba(225,112,85,0.15); border-left: 4px solid #e17055; }
        
        #roomInfo { margin-top: 15px; display: none; }
        #mpGameControls { margin-top: 15px; display: none; }
        #mpCategoryList { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        
        .status-online { color: #00b894; }
        .status-offline { color: #e17055; }
        
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .category-card { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 25px; cursor: pointer; transition: all 0.3s; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .category-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .category-card h3 { font-size: 1.5rem; margin-bottom: 10px; }
        .questions-count { display: inline-block; background: #ff4757; padding: 4px 16px; border-radius: 40px; font-size: 0.8rem; }
        
        .game-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; }
        .game-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 30px; padding: 30px; color: #1e1e2f; }
        .game-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .timer { font-size: 2rem; font-weight: bold; background: #1e1e2f; color: #ffa502; padding: 10px 24px; border-radius: 60px; }
        .score { font-size: 1.2rem; background: #ff4757; color: white; padding: 10px 24px; border-radius: 60px; }
        .close-game { background: #2c3e50; color: white; border: none; padding: 10px 24px; border-radius: 60px; cursor: pointer; }
        .close-game:hover { background: #e74c3c; }
        .quiz-table { overflow-x: auto; max-height: 400px; overflow-y: auto; margin: 15px 0; border-radius: 15px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #1e1e2f; color: white; position: sticky; top: 0; }
        .input-group { display: flex; gap: 12px; margin: 15px 0; }
        #quick-input { flex: 1; padding: 12px 20px; border-radius: 60px; border: 2px solid #ddd; font-size: 1rem; outline: none; }
        #quick-input:focus { border-color: #ff4757; }
        #quick-submit { padding: 12px 30px; background: #ff4757; color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: bold; }
        .message { padding: 10px 20px; border-radius: 60px; margin: 10px 0; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .game-complete { text-align: center; padding: 40px; background: linear-gradient(135deg, #1e1e2f, #2c3e50); color: white; border-radius: 25px; }
        .play-again { background: white; color: #1e1e2f; border: none; padding: 12px 30px; border-radius: 60px; cursor: pointer; margin: 10px; font-weight: bold; }
        .play-again:hover { background: #ff4757; color: white; }
        #found-list { margin-top: 10px; padding: 15px; background: #f5f5f5; border-radius: 15px; font-size: 0.9rem; max-height: 100px; overflow-y: auto; }
        .info-note { background: #e3f2fd; padding: 10px 15px; border-radius: 15px; margin: 10px 0; font-size: 0.9rem; color: #0c5460; }
        .progress { display: inline-block; background: #f0f0f0; padding: 8px 18px; border-radius: 60px; margin: 10px 0; }
        @media (max-width: 768px) { header h1 { font-size: 2rem; } .game-header { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 MEMORIZ</h1>
            <p>"Ce que tu sais, tu le mémorises. Ce que tu ne sais pas, tu l'apprends."</p>
        </header>

        <!-- MULTIJOUEUR -->
        <div class="multiplayer-section">
            <div class="multiplayer-header">
                <h2>👥 Mode Multijoueur</h2>
                <span id="connectionStatus" style="font-size:0.9rem;">⚪ <span class="status-offline">Déconnecté</span></span>
            </div>
            
            <div class="room-controls">
                <input type="text" id="pseudoInput" placeholder="👤 Pseudo" value="Joueur" style="flex:0.5; min-width:100px;">
                <input type="text" id="roomCodeInput" placeholder="🔑 Code (6 caractères)" maxlength="6">
                <button class="mp-btn" id="createRoomBtn">🆕 Créer</button>
                <button class="mp-btn secondary" id="joinRoomBtn">🔗 Rejoindre</button>
                <button class="mp-btn danger" id="leaveRoomBtn" style="display:none;">🚪 Quitter</button>
            </div>
            
            <div id="roomInfo" style="display:none;">
                <p><strong>🏠 Salle :</strong> <span id="roomCodeDisplay"></span> 
                    <button class="mp-btn" style="padding:4px 12px; font-size:0.7rem;" id="copyRoomCodeBtn">📋 Copier</button>
                    <span style="margin-left:15px; font-size:0.9rem; opacity:0.7;" id="roomStatus">En attente...</span>
                </p>
            </div>
            
            <div id="playersContainer">
                <p style="opacity:0.7;">👥 Joueurs : <span id="playerCount">0</span></p>
                <div class="players-list" id="playersList"></div>
            </div>
            
            <div id="mpMessage" class="mp-message"></div>
            
            <div id="mpGameControls" style="display:none;">
                <hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">
                <p><strong>🎮 Lancer un quiz :</strong></p>
                <div id="mpCategoryList"></div>
            </div>
        </div>

        <!-- CATÉGORIES SOLO -->
        <h2 style="text-align:center; margin:30px 0; font-size:2rem;">📚 Choisis ton défi</h2>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <script>
        // ============================================================
        // SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://azgstzbslxcwsecqrevv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6Z3N0emJzbHhjd3NlY3FyZXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMzI4OTEsImV4cCI6MjA5ODkwODg5MX0.ZPG31y8f4BHNP3v-d5DMejzNhOkhSgzdg0EZD8UC4f0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // CATÉGORIES
        // ============================================================
        const categories = [
            { key: 'series', label: '📺 Séries TV', data: ["Walter White","Jon Snow","Daenerys","Sherlock","Rick Grimes","Michael Scott","Tyrion","Eleven","Wednesday","Joey","House","Dexter","Don Draper","Carrie","Tony Soprano","Loki","Geralt","Elliot","Klaus","Joe Goldberg"] },
            { key: 'films', label: '🎬 Cinéma', data: ["Harry Potter","Luke Skywalker","Jack Sparrow","James Bond","Indiana Jones","Forrest Gump","John Wick","Tony Stark","Peter Parker","Bruce Wayne","Ellen Ripley","Neo","Tyler Durden","Michael Corleone","Hannibal","Joker","Willy Wonka","Rocky","Ethan Hunt","John McClane"] },
            { key: 'anime', label: '🌍 Anime/Manga', data: ["Son Goku","Naruto","Luffy","Pikachu","Sailor Moon","Ichigo","Eren Yeager","Light Yagami","Levi","Sasuke","Vegeta","Gojo","Tanjiro","Killua","Gon","Edward Elric","Mikasa","Kakashi","Itachi","Zoro","Natsu","Deku","All Might","Saitama","Ken Kaneki","L","Ash","Alucard","Spike","Jotaro"] },
            { key: 'sports', label: '⚽ Sports', data: ["Messi","Ronaldo","Neymar","Mbappe","Zidane","Beckham","Ronaldinho","Maradona","Pele","Benzema","LeBron","Jordan","Kobe","Curry","Durant","Shaq","Magic","Bird","Giannis","Iverson","Serena","Federer","Nadal","Tyson","Ali","Bolt","Phelps","Brady","Woods","Biles"] },
            { key: 'musique', label: '🎵 Musique', data: ["Michael Jackson","Beyonce","Taylor Swift","Drake","Eminem","Rihanna","Bieber","Ed Sheeran","Ariana Grande","Kanye West","Adele","Bruno Mars","Lady Gaga","Weeknd","Dua Lipa"] },
            { key: 'football', label: '⚽ Foot Légendes', data: ["Messi","Pelé","Maradona","Cristiano Ronaldo","Cruyff","Zidane","Ronaldo Nazário","Platini","Beckenbauer","Di Stéfano","Ronaldinho","Xavi","Iniesta","Maldini","Best"] },
            { key: 'mangas', label: '📖 Meilleurs Mangas', data: ["One Piece","Dragon Ball","Naruto","Detective Conan","Doraemon","Demon Slayer","Jujutsu Kaisen","Attack on Titan","Slam Dunk","Bleach","Hunter x Hunter","JoJo","Fist of the North Star","Astro Boy","Golgo 13"] },
            { key: 'jeuxvideo', label: '🎮 Jeux Vidéo', data: ["Super Mario","Zelda","Tetris","Minecraft","GTA V","Final Fantasy","Metal Gear Solid","Half-Life 2","Witcher 3","Dark Souls"] },
            { key: 'superheros', label: '🦸 Super-héros', data: ["Spider-Man","Batman","Superman","Iron Man","Joker","Captain America","Wolverine","Wonder Woman","Deadpool","Harley Quinn","Thor","Hulk","Flash","Black Panther","Thanos","Doctor Doom","Green Lantern","Magneto","Aquaman","Darkseid"] },
            { key: 'rap', label: '🎤 Rap', data: ["Tupac","Notorious B.I.G.","Jay-Z","Eminem","IAM","Nas","Booba","Kendrick Lamar","NTM","Dr. Dre","MC Solaar","Soprano","Snoop Dogg","Kaaris","Lil Wayne"] }
        ];

        // ============================================================
        // JEU SOLO
        // ============================================================
        let currentGame = null, timerInterval = null, isMultiplayerGame = false;

        function normalize(str) { if (!str) return ''; return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim(); }

        class QuizGame {
            constructor(label, data) { this.label=label; this.questions=[...data]; this.correct=new Array(this.questions.length).fill(false); this.score=0; this.timeLeft=600; this.active=true; }
            find(a) { const n=normalize(a); for(let i=0;i<this.questions.length;i++){ if(!this.correct[i] && n===normalize(this.questions[i])) return i; } return -1; }
            submit(a) { if(!this.active) return {success:false}; const i=this.find(a.trim()); if(i===-1) return {success:false,notFound:true}; if(this.correct[i]) return {success:false,already:true}; this.correct[i]=true; this.score++; return {success:true,index:i,name:this.questions[i]}; }
            isComplete() { return this.correct.every(c=>c); }
            getProgress() { const a=this.correct.filter(c=>c).length; return {answered:a,total:this.questions.length}; }
        }

        function showGame(key, multi=false) {
            if(currentGame) closeGame();
            isMultiplayerGame=multi;
            const cat=categories.find(c=>c.key===key); if(!cat) return;
            currentGame=new QuizGame(cat.label, cat.data);
            let rows='';
            for(let i=0;i<currentGame.questions.length;i++) rows+=`<tr id="row-${i}"><td>${i+1}</td><td id="ans-${i}">❓ ???</td><td id="stat-${i}" style="text-align:center;">⏳</td></tr>`;
            const badge=multi?'<span style="background:#6c5ce7;color:white;padding:2px 12px;border-radius:40px;font-size:0.7rem;margin-left:10px;">👥 Multijoueur</span>':'';
            const html=`<div class="game-panel" id="gamePanel"><div class="game-container"><div class="game-header"><h2>${cat.label} ${badge}</h2><button style="background:#ff4757;color:white;border:none;padding:8px 20px;border-radius:50px;cursor:pointer;" onclick="restartGame()">🔄 Recommencer</button><div class="timer" id="timer">10:00</div><div class="score" id="score">🎯 0/${currentGame.questions.length}</div><button class="close-game" onclick="closeGame()">✕ Fermer</button></div><div class="progress" id="progress">📊 0/${currentGame.questions.length} (0%)</div><div class="quiz-table"><table><thead><tr><th>#</th><th>Personnage</th><th>✅</th></tr></thead><tbody>${rows}</tbody></table></div><div class="input-group"><input type="text" id="quick-input" placeholder="✏️ Tape un nom..." autocomplete="off"><button id="quick-submit">🎮 Valider</button></div><div id="message"></div><div id="found-list"></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend',html);
            startTimer();
            document.getElementById('quick-submit').onclick=handleSubmit;
            document.getElementById('quick-input').onkeypress=e=>{if(e.key==='Enter')handleSubmit();};
            document.getElementById('quick-input').focus();
        }

        function handleSubmit() {
            if(!currentGame||!currentGame.active) return;
            const input=document.getElementById('quick-input'), a=input.value.trim();
            if(!a){showMsg('📝 Entrez un nom','error');return;}
            const r=currentGame.submit(a);
            if(r.success){
                playSound(true);
                document.getElementById(`ans-${r.index}`).textContent=`✅ ${r.name}`;
                document.getElementById(`ans-${r.index}`).style.color='#28a745';
                document.getElementById(`stat-${r.index}`).textContent='✓';
                document.getElementById(`stat-${r.index}`).style.color='#28a745';
                updateScore();
                showMsg(`✅ "${r.name}" trouvé !`,'success');
                input.value=''; input.focus();
                updateFoundList();
                if(isMultiplayerGame && mpState.isInRoom) updatePlayerScoreMp(mpState.playerId,currentGame.score);
                if(currentGame.isComplete()) endGame(true);
            } else if(r.notFound){ playSound(false); showMsg(`❌ "${a}" pas dans la liste`,'error'); input.value=''; input.focus(); }
            else if(r.already){ playSound(false); showMsg(`⚠️ "${a}" déjà trouvé`,'error'); input.value=''; input.focus(); }
        }

        function updateScore(){ const p=currentGame.getProgress(); document.getElementById('score').textContent=`🎯 ${currentGame.score}/${currentGame.questions.length}`; document.getElementById('progress').textContent=`📊 ${p.answered}/${p.total} (${Math.round(p.answered/p.total*100)}%)`; }
        function updateFoundList(){ const el=document.getElementById('found-list'); if(!el)return; const f=[]; for(let i=0;i<currentGame.questions.length;i++) if(currentGame.correct[i]) f.push(currentGame.questions[i]); el.innerHTML=f.length?`<strong>Trouvés (${f.length}/${currentGame.questions.length}) :</strong> ${f.join(', ')}`:'💡 Tape un nom pour commencer !'; }
        function startTimer(){ if(timerInterval)clearInterval(timerInterval); timerInterval=setInterval(()=>{ if(!currentGame||!currentGame.active)return; currentGame.timeLeft--; const el=document.getElementById('timer'); if(el){ const m=Math.floor(currentGame.timeLeft/60), s=currentGame.timeLeft%60; el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; if(currentGame.timeLeft<=60)el.style.background='#ff4757'; } if(currentGame.timeLeft<=0)endGame(false); },1000); }
        function endGame(win){ if(!currentGame)return; currentGame.active=false; if(timerInterval)clearInterval(timerInterval); for(let i=0;i<currentGame.questions.length;i++){ if(!currentGame.correct[i]){ const el=document.getElementById(`ans-${i}`); if(el){el.textContent=`❌ ${currentGame.questions[i]}`;el.style.color='#dc3545';} } } const container=document.querySelector('.game-container'); const pct=Math.round((currentGame.score/currentGame.questions.length)*100); container.innerHTML=`<div class="game-complete"><h2>${win?'🏆 FÉLICITATIONS !':'⏰ TEMPS ÉCOULÉ !'}</h2><p style="font-size:1.5rem;margin:20px 0;">Score : ${currentGame.score}/${currentGame.questions.length} (${pct}%)</p><button class="play-again" onclick="closeGame()">🏠 Retour</button><button class="play-again" onclick="restartGame()">🔄 Rejouer</button></div>`; if(isMultiplayerGame&&mpState.isInRoom&&mpState.isHost)broadcastGameUpdateMp({type:'game_end'}); }
        function closeGame(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} const panel=document.getElementById('gamePanel'); if(panel)panel.remove(); currentGame=null; isMultiplayerGame=false; }
        function restartGame(){ if(currentGame){ const key=categories.find(c=>c.label===currentGame.label)?.key; const mp=isMultiplayerGame; closeGame(); if(key)setTimeout(()=>showGame(key,mp),50); } }
        function playSound(good){ try{ const ctx=new(window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(), gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type=good?'sine':'sawtooth'; osc.frequency.value=good?880:300; gain.gain.value=good?0.2:0.1; osc.start(); osc.stop(ctx.currentTime+(good?0.15:0.25)); if(good){setTimeout(()=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.type='sine';o2.frequency.value=1100;g2.gain.value=0.15;o2.start();o2.stop(ctx.currentTime+0.15);},120);} }catch(e){} }
        function showMsg(msg,type){ const el=document.getElementById('message'); if(!el)return; el.innerHTML=`<div class="message ${type}">${msg}</div>`; setTimeout(()=>el.innerHTML='',3000); }

        // ============================================================
        // MULTIJOUEUR
        // ============================================================
        let mpState={roomCode:null,playerId:null,playerName:'Joueur',isHost:false,isInRoom:false,players:[],scores:{},gameStarted:false};
        let mpChannel=null;

        function getPlayerId(){ if(!mpState.playerId) mpState.playerId='p_'+Date.now()+'_'+Math.random().toString(36).substr(2,4); return mpState.playerId; }
        function getPlayerName(){ const input=document.getElementById('pseudoInput'); if(input&&input.value.trim()) mpState.playerName=input.value.trim(); return mpState.playerName||'Joueur'; }
        function showMpMsg(msg,type='info'){ const el=document.getElementById('mpMessage'); el.textContent=msg; el.className='mp-message '+type; setTimeout(()=>{el.className='mp-message';},5000); }
        function updateStatus(connected,msg=''){ const el=document.getElementById('connectionStatus'); el.innerHTML=connected?'🟢 <span class="status-online">Connecté</span>'+(msg?'| '+msg:''):'⚪ <span class="status-offline">Déconnecté</span>'; }
        function updatePlayers(){ const list=document.getElementById('playersList'), count=document.getElementById('playerCount'); list.innerHTML=''; count.textContent=mpState.players.length; mpState.players.forEach(p=>{ const div=document.createElement('div'); div.className='player-card'+(p.id===mpState.playerId?' you':''); const score=mpState.scores[p.id]||0; div.innerHTML=`<span>${p.name}</span><span class="score-mp">🎯 ${score}</span><span style="font-size:0.7rem;opacity:0.6;">${p.id===mpState.playerId?'👤 Toi':p.isHost?'👑 Hôte':''}</span>`; list.appendChild(div); }); }

        async function loadPlayers(roomCode){ try{ const {data,error}=await supabase.from('players').select('*').eq('room_code',roomCode); if(error)throw error; mpState.players=data.map(p=>({id:p.player_id,name:p.player_name,isHost:p.is_host})); const {data:scores}=await supabase.from('room_scores').select('*').eq('room_code',roomCode); if(scores){mpState.scores={};scores.forEach(s=>{mpState.scores[s.player_id]=s.score||0;});} updatePlayers(); }catch(e){console.error(e);} }

        function setupChannel(roomCode){ if(mpChannel)supabase.removeChannel(mpChannel); mpChannel=supabase.channel(`room-${roomCode}`); mpChannel.on('postgres_changes',{event:'*',schema:'public',table:'players',filter:`room_code=eq.${roomCode}`},async()=>{await loadPlayers(roomCode);}); mpChannel.on('postgres_changes',{event:'*',schema:'public',table:'room_scores',filter:`room_code=eq.${roomCode}`},async()=>{await loadPlayers(roomCode);}); mpChannel.on('broadcast',{event:'game_update'},(payload)=>{const d=payload.payload; if(d.type==='score_update'){mpState.scores[d.playerId]=d.score; updatePlayers();} if(d.type==='game_start'&&d.category){mpState.gameCategory=d.category; mpState.gameStarted=true; showMpMsg(`🎮 Quiz "${d.category}" commencé !`,'success'); if(!document.getElementById('gamePanel'))setTimeout(()=>showGame(d.category,true),300);} if(d.type==='game_end'){mpState.gameStarted=false; showMpMsg('🏁 Quiz terminé !','success');} }); mpChannel.subscribe(); }

        async function broadcastGameUpdateMp(data){ if(!mpChannel||!mpState.roomCode)return; mpChannel.send({type:'broadcast',event:'game_update',payload:data}); }

        async function updatePlayerScoreMp(playerId,score){ if(!mpState.roomCode)return; mpState.scores[playerId]=score; updatePlayers(); broadcastGameUpdateMp({type:'score_update',playerId,score}); try{await supabase.from('room_scores').upsert({room_code:mpState.roomCode,player_id:playerId,score,updated_at:new Date().toISOString()},{onConflict:'room_code, player_id'});}catch(e){} }

        async function createRoomMp(){ const id=getPlayerId(), name=getPlayerName(); if(!name.trim()){showMpMsg('❌ Entrez un pseudo','error');return;} let code='', attempts=0, exists=true; while(exists&&attempts<20){ code=generateCode(); const {data}=await supabase.from('rooms').select('code').eq('code',code).maybeSingle(); exists=data!==null; attempts++; } if(attempts>=20){showMpMsg('❌ Erreur création','error');return;} try{ await supabase.from('rooms').insert([{code,created_by:id,status:'waiting'}]); await supabase.from('players').insert([{room_code:code,player_id:id,player_name:name,is_host:true}]); mpState.roomCode=code; mpState.isInRoom=true; mpState.isHost=true; mpState.playerId=id; mpState.playerName=name; mpState.players=[{id,name,isHost:true}]; mpState.scores={}; mpState.scores[id]=0; setupChannel(code); updateUI(); showMpMsg(`✅ Salle créée ! Code : ${code}`,'success'); updateStatus(true,`Salle ${code} (Hôte)`); }catch(e){showMpMsg('❌ Erreur: '+e.message,'error');} }

        function generateCode(){ const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let r=''; for(let i=0;i<6;i++)r+=c.charAt(Math.floor(Math.random()*c.length)); return r; }

        async function joinRoomMp(code){ const id=getPlayerId(), name=getPlayerName(); if(!code||code.length!==6){showMpMsg('❌ Code invalide','error');return;} if(!name.trim()){showMpMsg('❌ Entrez un pseudo','error');return;} try{ const {data:room}=await supabase.from('rooms').select('*').eq('code',code.toUpperCase()).single(); if(!room){showMpMsg('❌ Salle introuvable','error');return;} await supabase.from('players').insert([{room_code:code.toUpperCase(),player_id:id,player_name:name,is_host:false}]); mpState.roomCode=code.toUpperCase(); mpState.isInRoom=true; mpState.isHost=false; mpState.playerId=id; mpState.playerName=name; setupChannel(code.toUpperCase()); await loadPlayers(code.toUpperCase()); updateUI(); showMpMsg(`✅ Rejoint ${code.toUpperCase()} !`,'success'); updateStatus(true,`Salle ${code.toUpperCase()}`); }catch(e){showMpMsg('❌ Erreur: '+e.message,'error');} }

        async function leaveRoomMp(){ if(!mpState.roomCode||!mpState.playerId)return; try{ await supabase.from('players').delete().eq('room_code',mpState.roomCode).eq('player_id',mpState.playerId); if(mpState.isHost){await supabase.from('rooms').delete().eq('code',mpState.roomCode); await supabase.from('room_scores').delete().eq('room_code',mpState.roomCode); showMpMsg('🚪 Salle fermée','info');}else showMpMsg('🚪 Vous avez quitté','info'); }catch(e){} resetUI(); if(currentGame)closeGame(); }

        function resetUI(){ document.getElementById('roomInfo').style.display='none'; document.getElementById('leaveRoomBtn').style.display='none'; document.getElementById('mpGameControls').style.display='none'; document.getElementById('createRoomBtn').disabled=false; document.getElementById('joinRoomBtn').disabled=false; document.getElementById('roomCodeInput').disabled=false; document.getElementById('roomCodeInput').value=''; document.getElementById('playersList').innerHTML=''; document.getElementById('playerCount').textContent='0'; updateStatus(false); if(mpChannel){supabase.removeChannel(mpChannel);mpChannel=null;} mpState.isInRoom=false; mpState.roomCode=null; mpState.players=[]; mpState.scores={}; mpState.gameStarted=false; mpState.isHost=false; }

        function updateUI(){ document.getElementById('roomInfo').style.display='block'; document.getElementById('roomCodeDisplay').textContent=mpState.roomCode; document.getElementById('leaveRoomBtn').style.display='inline-block'; document.getElementById('mpGameControls').style.display='block'; document.getElementById('createRoomBtn').disabled=true; document.getElementById('joinRoomBtn').disabled=true; document.getElementById('roomCodeInput').disabled=true; document.getElementById('roomStatus').textContent=mpState.isHost?'👑 Hôte':'👥 Joueur'; updatePlayers(); const list=document.getElementById('mpCategoryList'); list.innerHTML=''; const mpKeys=['series','films','anime','sports','musique','football','mangas','jeuxvideo','superheros','rap']; mpKeys.forEach(key=>{const def=categories.find(c=>c.key===key); if(!def)return; const btn=document.createElement('button'); btn.className='mp-btn secondary'; btn.textContent=def.label; btn.style.fontSize='0.8rem'; btn.style.padding='6px 14px'; btn.onclick=()=>startMpGame(key); if(!mpState.isHost)btn.disabled=true; list.appendChild(btn);}); }

        async function startMpGame(key){ if(!mpState.isHost){showMpMsg('❌ Seul l\'hôte peut lancer','error');return;} if(mpState.gameStarted){showMpMsg('⚠️ Quiz en cours','error');return;} try{await supabase.from('room_scores').delete().eq('room_code',mpState.roomCode);}catch(e){} mpState.scores={}; mpState.players.forEach(p=>{mpState.scores[p.id]=0;}); updatePlayers(); broadcastGameUpdateMp({type:'game_start',category:key,hostId:mpState.playerId}); if(currentGame)closeGame(); setTimeout(()=>showGame(key,true),300); }

        // ============================================================
        // RENDU CATÉGORIES + INIT
        // ============================================================
        function renderCategories(){ const grid=document.getElementById('categoryGrid'); grid.innerHTML=''; categories.forEach(cat=>{ const card=document.createElement('div'); card.className='category-card'; card.innerHTML=`<h3>${cat.label}</h3><span class="questions-count">${cat.data.length} pers.</span>`; card.onclick=()=>showGame(cat.key,false); grid.appendChild(card); }); }

        document.addEventListener('DOMContentLoaded',()=>{
            renderCategories();
            document.getElementById('createRoomBtn').onclick=createRoomMp;
            document.getElementById('joinRoomBtn').onclick=()=>{const code=document.getElementById('roomCodeInput').value.toUpperCase().trim(); joinRoomMp(code);};
            document.getElementById('leaveRoomBtn').onclick=leaveRoomMp;
            document.getElementById('copyRoomCodeBtn').onclick=()=>{if(mpState.roomCode){navigator.clipboard?.writeText(mpState.roomCode); showMpMsg('📋 Copié !','success');}};
            document.getElementById('roomCodeInput').onkeypress=e=>{if(e.key==='Enter'){const code=document.getElementById('roomCodeInput').value.toUpperCase().trim(); joinRoomMp(code);}};
            document.getElementById('pseudoInput').value='Joueur_'+Math.floor(Math.random()*1000);
            updateStatus(false);
        });

        window.closeGame=closeGame; window.restartGame=restartGame;
    </script>
</body>
</html>
